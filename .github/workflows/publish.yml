name: Publish to Ansible Galaxy

on:
  release:
    types: [published]

jobs:
  galaxy:
    name: Publish to Ansible Galaxy
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Checkout
        uses: actions/checkout@v6
      - name: 🚀 Publish to Ansible Galaxy
        uses: hspaans/ansible-galaxy-action@v2.1.1
        with:
          api_key: ${{ secrets.ANSIBLE_GALAXY_TOKEN }}
